    <title>ControlPetro — Artículos de Características</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --teal: #0D9488;
            --teal-light: #5EEAD4;
            --teal-50: #F0FDFA;
            --teal-100: #CCFBF1;
            --orange: #F97316;
            --orange-50: #FFF7ED;
            --orange-100: #FFEDD5;
            --pink: #EC4899;
            --pink-50: #FDF2F8;
            --pink-100: #FCE7F3;
            --indigo: #6366F1;
            --indigo-50: #EEF2FF;
            --indigo-100: #E0E7FF;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: var(--gray-700);
            line-height: 1.7;
        }

        /* Navigation Bar */
        nav {
            background-color: #FFFFFF;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo span {
            color: var(--teal);
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--gray-200);
        }

        .nav-back:hover {
            color: var(--teal);
            border-color: var(--teal);
            background: var(--teal-50);
        }

        /* Hero Image */
        .article-hero {
            width: 100%;
            height: 340px;
            overflow: hidden;
            position: relative;
        }

        .article-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .article-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(transparent, #FFFFFF);
        }

        /* Main Container */
        main {
            max-width: 780px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        /* Article Header */
        .article-header {
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .article-badge {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .badge-teal {
            background: var(--teal-100);
            color: var(--teal);
        }

        .badge-orange {
            background: var(--orange-100);
            color: var(--orange);
        }

        .badge-pink {
            background: var(--pink-100);
            color: var(--pink);
        }

        .badge-indigo {
            background: var(--indigo-100);
            color: var(--indigo);
        }

        .article-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.75rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .article-subtitle {
            font-size: 1.15rem;
            color: var(--gray-500);
            font-weight: 400;
            line-height: 1.6;
        }

        /* Article Content */
        .article-content {
            line-height: 1.8;
        }

        .article-content section {
            margin-bottom: 2.5rem;
        }

        .article-content h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
            padding-left: 1rem;
            position: relative;
        }

        .article-content h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.15em;
            bottom: 0.15em;
            width: 3px;
            border-radius: 3px;
        }

        .theme-teal .article-content h2::before { background: var(--teal); }
        .theme-orange .article-content h2::before { background: var(--orange); }
        .theme-pink .article-content h2::before { background: var(--pink); }
        .theme-indigo .article-content h2::before { background: var(--indigo); }

        .article-content p {
            color: var(--gray-600);
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        .article-content ul {
            list-style: none;
            margin-left: 0;
            margin-bottom: 1.5rem;
        }

        .article-content li {
            color: var(--gray-600);
            margin-bottom: 0.6rem;
            padding-left: 1.5rem;
            position: relative;
            font-size: 1.05rem;
        }

        .article-content li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.6em;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .theme-teal .article-content li::before { background: var(--teal); }
        .theme-orange .article-content li::before { background: var(--orange); }
        .theme-pink .article-content li::before { background: var(--pink); }
        .theme-indigo .article-content li::before { background: var(--indigo); }

        .highlight {
            font-weight: 600;
            color: var(--gray-800);
        }

        .theme-teal .highlight { color: var(--teal); }
        .theme-orange .highlight { color: var(--orange); }
        .theme-pink .highlight { color: var(--pink); }
        .theme-indigo .highlight { color: var(--indigo); }

        /* Callout box */
        .callout {
            padding: 1.25rem 1.5rem;
            border-radius: 10px;
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }

        .theme-teal .callout { background: var(--teal-50); border-left: 3px solid var(--teal); }
        .theme-orange .callout { background: var(--orange-50); border-left: 3px solid var(--orange); }
        .theme-pink .callout { background: var(--pink-50); border-left: 3px solid var(--pink); }
        .theme-indigo .callout { background: var(--indigo-50); border-left: 3px solid var(--indigo); }

        .callout p { color: var(--gray-700); margin-bottom: 0; font-size: 0.95rem; }

        /* 404 Page */
        .error-container {
            max-width: 780px;
            margin: 5rem auto;
            padding: 2rem;
            text-align: center;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.75rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--gray-500);
            margin-bottom: 2rem;
        }

        .error-link {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            background-color: var(--teal);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .error-link:hover {
            background-color: #0b7c71;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--gray-400);
            font-size: 0.85rem;
            border-top: 1px solid var(--gray-100);
        }

        /* Responsive */
        @media (max-width: 640px) {
            main {
                padding: 1.5rem 1rem 3rem;
            }

            .article-hero {
                height: 220px;
            }

            .article-title {
                font-size: 1.75rem;
            }

            nav {
                padding: 0.75rem 1rem;
            }

            .nav-logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

        function getFeatureFromUrl() {
            var params = new URLSearchParams(window.location.search);
            return params.get('feature');

        function renderContent() {
            var feature = getFeatureFromUrl();
            var container = document.getElementById('article-container');
            var heroContainer = document.getElementById('hero-container');
            var heroImage = document.getElementById('hero-image');

            if (!feature || !articles[feature]) {
                heroContainer.style.display = 'none';
                container.innerHTML =
                    '<div class="error-container">' +
                        '<h1 class="error-title">Pagina no encontrada</h1>' +
                        '<p class="error-message">Lo sentimos, no pudimos encontrar la pagina que buscas.</p>' +
                        '<a href="/" class="error-link">Volver a inicio</a>' +
                    '</div>';
                return;
            }

            var article = articles[feature];

            heroImage.src = article.heroImage;
            heroImage.alt = article.heroAlt;

            document.body.classList.add(article.theme);

            container.innerHTML =
                '<div class="article-header">' +
                    '<span class="article-badge ' + article.badgeClass + '">' + article.badge + '</span>' +
                    '<h1 class="article-title">' + article.title + '</h1>' +
                    '<p class="article-subtitle">' + article.subtitle + '</p>' +
                '</div>' +
                '<div class="article-content">' +
                    article.content +
                '</div>';
        }

        document.addEventListener('DOMContentLoaded', renderContent);
    </script>
